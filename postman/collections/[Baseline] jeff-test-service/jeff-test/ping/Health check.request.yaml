type: http
name: Health check
url: '{{baseUrl}}/jeff-test/ping'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "ok",
            "timestamp": "2026-05-04T12:00:00Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is reachable.
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "code": "INTERNAL_ERROR",
            "message": "Something went wrong."
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Server error.
