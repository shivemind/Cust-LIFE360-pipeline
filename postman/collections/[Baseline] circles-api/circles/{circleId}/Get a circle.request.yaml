type: http
name: Get a circle
url: '{{baseUrl}}/circles/:circleId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: circleId
    value: abc123
    description: Unique identifier for a circle
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "memberCount": 9096
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Circle details
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": 8880,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": 8880,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Circle not found
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "code": 8880,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
