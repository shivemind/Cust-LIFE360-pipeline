type: http
name: List circles
url: '{{baseUrl}}/circles'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          [
            {
              "id": "string",
              "name": "string",
              "memberCount": 5480
            },
            {
              "id": "string",
              "name": "string",
              "memberCount": 2036
            }
          ]
      headers:
        - key: Content-Type
          value: application/json
    name: A list of circles
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": 2740,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "code": 2740,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
