type: http
name: Get a circle
url: '{{baseUrl}}/circles/:circleId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: circleId
    value: abc123
    description: Unique identifier for a circle
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "memberCount": 4640
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Circle details
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": 6949,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Unauthorized
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": 6949,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Circle not found
  - response:
      statusCode: 500
      statusText: Internal Server Error
      body:
        type: json
        content: |-
          {
            "code": 6949,
            "message": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Internal server error
